global:
  scrape_interval: 10s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'nestjs-app'
    metrics_path: /metrics
    dns_sd_configs:
      - names: ['app']
        type: 'A'
        port: 8000